<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대기표 발급 (문자알림)</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Malgun Gothic', sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    display: flex; flex-direction: column;
    user-select: none;
}
.topbar {
    display: flex; align-items: center;
    padding: 16px 28px;
    background: rgba(0,0,0,0.25);
    flex-shrink: 0;
}
.shop-name { font-size: 22px; font-weight: 700; flex: 1; }
.wait-badge {
    background: rgba(0,255,136,0.15); border: 1px solid rgba(0,255,136,0.4);
    border-radius: 20px; padding: 6px 16px; font-size: 15px; color: #00FF88;
}

/* 전화번호 입력 영역 */
.phone-section {
    padding: 20px 28px 0;
    flex-shrink: 0;
}
.phone-label { font-size: 17px; opacity: .75; margin-bottom: 10px; }
.phone-row { display: flex; gap: 10px; align-items: center; }
.phone-input {
    flex: 1; padding: 14px 18px;
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 12px; color: white; font-size: 22px;
    font-family: inherit; outline: none; letter-spacing: 2px;
    transition: border .2s;
}
.phone-input:focus { border-color: #00FF88; }
.phone-input::placeholder { font-size: 16px; letter-spacing: 0; opacity: .5; }
.phone-hint { font-size: 13px; opacity: .5; margin-top: 6px; }

.main {
    flex: 1; padding: 20px 28px;
    display: flex; flex-direction: column; gap: 16px;
}
.guide { font-size: 18px; text-align: center; opacity: .7; }
.category-grid {
    display: grid; gap: 18px;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    align-content: start;
}
.cat-btn {
    background: rgba(255,255,255,0.12);
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 20px; color: white;
    font-size: 26px; font-weight: 700;
    font-family: inherit; cursor: pointer;
    transition: all .15s;
    min-height: 150px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 8px;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
}
.cat-btn:hover { background: rgba(255,255,255,0.22); border-color: rgba(255,255,255,0.5); }
.cat-btn:active { transform: scale(0.96); }
.cat-btn.selected { background: rgba(0,255,136,0.2); border-color: #00FF88; }
.cat-btn > * { pointer-events: none; }
.cat-code { font-size: 14px; opacity: .45; font-weight: 400; }

/* 메뉴 선택 */
.menu-section { display: flex; flex-direction: column; gap: 12px; }
.menu-guide { font-size: 18px; opacity: .7; }
.menu-guide span { font-size: 14px; opacity: .6; }
.menu-grid {
    display: grid; gap: 12px;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
}
.menu-btn {
    background: rgba(255,255,255,0.1);
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 16px; color: white;
    font-size: 20px; font-weight: 600;
    font-family: inherit; cursor: pointer;
    min-height: 80px;
    display: flex; align-items: center; justify-content: center;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    transition: all .15s;
}
.menu-btn:hover { background: rgba(255,255,255,0.2); }
.menu-btn:active { transform: scale(0.97); }
.menu-btn.selected { background: rgba(0,255,136,0.2); border-color: #00FF88; }
.menu-btn > * { pointer-events: none; }

/* 접수하기 버튼 */
.submit-wrap { padding: 0 0 4px; }
.submit-btn {
    width: 100%; padding: 20px;
    background: #00FF88; color: #1a1a2e;
    border: none; border-radius: 18px;
    font-size: 22px; font-weight: 700;
    font-family: inherit; cursor: pointer;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    transition: opacity .15s;
}
.submit-btn:active { opacity: .8; }

/* 성공 오버레이 */
.success-overlay {
    display: none; position: fixed; inset: 0;
    background: #0d0d1a;
    z-index: 200;
    flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 40px;
}
.success-overlay.active { display: flex; }
.success-label { font-size: 24px; opacity: .6; margin-bottom: 8px; }
.success-number {
    font-size: 140px; font-weight: 900; color: #00FF88; line-height: 1;
    text-shadow: 0 0 80px rgba(0,255,136,0.6);
    animation: pulse 1.5s ease-in-out 1;
}
@keyframes pulse {
    0%   { transform: scale(.7); opacity: 0; }
    60%  { transform: scale(1.08); }
    100% { transform: scale(1); opacity: 1; }
}
.success-cat { font-size: 24px; margin-top: 12px; opacity: .65; }
.success-sms { font-size: 17px; margin-top: 12px; color: #00FF88; }
.success-wait { font-size: 18px; margin-top: 8px; opacity: .5; }
.success-close {
    margin-top: 48px; padding: 18px 60px;
    background: rgba(255,255,255,0.12);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 16px; color: white; font-size: 22px;
    cursor: pointer; font-family: inherit;
    touch-action: manipulation;
    transition: background .15s;
}
.success-close:active { background: rgba(255,255,255,0.25); }
.countdown { font-size: 14px; opacity: .4; margin-top: 12px; }
</style>
</head>
<body>

<div class="topbar">
    <div class="shop-name" id="shopName">로딩 중...</div>
    <div class="wait-badge" id="waitBadge" style="display:none"></div>
</div>

<div class="phone-section">
    <div class="phone-label">📱 문자 알림을 받을 전화번호를 입력하세요</div>
    <div class="phone-row">
        <input type="tel" class="phone-input" id="phoneInput"
               placeholder="010-0000-0000" maxlength="13"
               oninput="formatPhone(this)">
    </div>
    <div class="phone-hint">입력하면 순서가 되면 문자로 알려드립니다</div>
</div>

<div class="main">
    <div class="guide">서비스를 선택하세요</div>
    <div class="category-grid" id="categoryGrid">
        <div style="opacity:.4;text-align:center;grid-column:1/-1;padding:60px">로딩 중...</div>
    </div>

    <!-- 메뉴 선택 (설정에 따라 표시) -->
    <div class="menu-section" id="menuSection" style="display:none">
        <div class="menu-guide">메뉴를 선택하세요 <span>(선택사항)</span></div>
        <div class="menu-grid" id="menuGrid"></div>
    </div>

    <!-- 접수하기 버튼 (카테고리 선택 후 표시) -->
    <div class="submit-wrap" id="submitWrap" style="display:none">
        <button class="submit-btn" onclick="doIssue()">접수하기</button>
    </div>
</div>

<!-- 성공 오버레이 -->
<div class="success-overlay" id="successOverlay">
    <div class="success-label">대기번호</div>
    <div class="success-number" id="successNumber"></div>
    <div class="success-cat" id="successCat"></div>
    <div class="success-sms" id="successSms"></div>
    <div class="success-wait" id="successWait"></div>
    <button class="success-close" onclick="closeSuccess()">닫기</button>
    <div class="countdown" id="countdown"></div>
</div>

<script>
const slug = window.location.pathname.split('/')[1];
let config = { categories: [], menuItems: [], settings: {} };
let waitingCount = 0;
let closeTimer = null;
let countdownTimer = null;
let issuing = false;
let selectedCategory = null;
let selectedCategoryName = null;
let selectedMenu = null;

function esc(s) { const d = document.createElement('div'); d.textContent = String(s ?? ''); return d.innerHTML; }

async function init() {
    try {
        const [cfgRes, statusRes] = await Promise.all([
            fetch(`/api/public/${slug}/join-config`),
            fetch(`/api/public/${slug}/queue/status`),
        ]);
        if (cfgRes.ok) config = await cfgRes.json();
        if (statusRes.ok) { const s = await statusRes.json(); waitingCount = (s.waiting || []).length; }
        document.getElementById('shopName').textContent = config.tenantName || slug;
        updateWaitBadge();
        renderCategories();
    } catch (e) {
        console.error('init error', e);
        document.getElementById('shopName').textContent = '연결 오류';
    }
}

function updateWaitBadge() {
    const el = document.getElementById('waitBadge');
    if (waitingCount > 0) {
        el.textContent = `대기 ${waitingCount}명`;
        el.style.display = '';
    } else {
        el.style.display = 'none';
    }
}

function renderCategories() {
    const grid = document.getElementById('categoryGrid');
    if (!config.categories?.length) {
        grid.innerHTML = '<div style="opacity:.4;text-align:center;grid-column:1/-1;padding:60px">카테고리가 없습니다</div>';
        return;
    }
    grid.innerHTML = config.categories.map(c => `
        <button class="cat-btn" data-code="${esc(c.code)}" data-name="${esc(c.name)}">
            <span>${esc(c.name)}</span>
            <span class="cat-code">${esc(c.code)}</span>
        </button>`).join('');
    grid.querySelectorAll('.cat-btn').forEach(btn => {
        btn.addEventListener('click', () => selectCategory(btn.dataset.code, btn.dataset.name));
    });
}

function selectCategory(code, name) {
    selectedCategory = code;
    selectedCategoryName = name;
    selectedMenu = null;

    document.querySelectorAll('.cat-btn').forEach(b =>
        b.classList.toggle('selected', b.dataset.code === code));

    const hasMenu = config.settings?.menu_selection_enabled && config.menuItems?.length;
    if (hasMenu) {
        renderMenuItems();
        document.getElementById('menuSection').style.display = '';
    } else {
        document.getElementById('menuSection').style.display = 'none';
    }
    document.getElementById('submitWrap').style.display = '';
}

function renderMenuItems() {
    const grid = document.getElementById('menuGrid');
    grid.innerHTML = config.menuItems.map(m => `
        <button class="menu-btn" data-code="${esc(m.code)}" data-name="${esc(m.name)}">
            <span>${esc(m.name)}</span>
        </button>`).join('');
    grid.querySelectorAll('.menu-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            if (selectedMenu === btn.dataset.code) {
                selectedMenu = null;
                document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('selected'));
            } else {
                selectedMenu = btn.dataset.code;
                document.querySelectorAll('.menu-btn').forEach(b =>
                    b.classList.toggle('selected', b.dataset.code === btn.dataset.code));
            }
        });
    });
}

async function doIssue() {
    if (!selectedCategory || issuing) return;

    const phoneRaw = document.getElementById('phoneInput').value.replace(/\D/g, '');
    if (phoneRaw.length < 10) {
        document.getElementById('phoneInput').focus();
        document.getElementById('phoneInput').style.borderColor = '#ff4757';
        setTimeout(() => { document.getElementById('phoneInput').style.borderColor = ''; }, 1500);
        return;
    }

    issuing = true;
    try {
        const res = await fetch(`/api/public/${slug}/queue/issue`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                categoryCode:  selectedCategory,
                entryChannel:  'kiosk_sms',
                customerPhone: phoneRaw,
                menuCode:      selectedMenu || undefined,
            }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error?.message || '발급 실패');
        const statusRes = await fetch(`/api/public/${slug}/queue/status`);
        if (statusRes.ok) { const s = await statusRes.json(); waitingCount = (s.waiting || []).length; }
        updateWaitBadge();
        const displayPhone = document.getElementById('phoneInput').value;
        showSuccess(data.ticket.ticket_number, selectedCategoryName, waitingCount, displayPhone, data.sandboxMode);
    } catch (err) {
        alert('발급 실패: ' + err.message);
        issuing = false;
    }
}

function showSuccess(number, catName, waiting, phone, sandboxMode) {
    document.getElementById('successNumber').textContent = number;
    document.getElementById('successCat').textContent = catName;
    document.getElementById('successSms').textContent = sandboxMode
        ? `테스트 모드 — 실제 문자 미발송 (${phone})`
        : `📨 ${phone} 으로 문자가 발송됩니다`;
    document.getElementById('successWait').textContent = `내 앞 대기 ${Math.max(0, waiting - 1)}명`;
    document.getElementById('successOverlay').classList.add('active');
    let secs = 5;
    document.getElementById('countdown').textContent = `${secs}초 후 자동으로 닫힙니다`;
    clearTimeout(closeTimer); clearInterval(countdownTimer);
    countdownTimer = setInterval(() => {
        secs--;
        document.getElementById('countdown').textContent = secs > 0 ? `${secs}초 후 자동으로 닫힙니다` : '';
    }, 1000);
    closeTimer = setTimeout(closeSuccess, 5000);
}

function closeSuccess() {
    clearTimeout(closeTimer); clearInterval(countdownTimer);
    document.getElementById('successOverlay').classList.remove('active');
    document.getElementById('phoneInput').value = '';
    selectedCategory = null;
    selectedCategoryName = null;
    selectedMenu = null;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('selected'));
    document.getElementById('menuSection').style.display = 'none';
    document.getElementById('menuGrid').innerHTML = '';
    document.getElementById('submitWrap').style.display = 'none';
    issuing = false;
}

function formatPhone(el) {
    el.style.borderColor = '';
    let v = el.value.replace(/\D/g, '');
    if (v.length > 11) v = v.slice(0, 11);
    if (v.length >= 7)      el.value = v.slice(0,3) + '-' + v.slice(3,7) + '-' + v.slice(7);
    else if (v.length >= 4) el.value = v.slice(0,3) + '-' + v.slice(3);
    else                    el.value = v;
}

init();
</script>
</body>
</html>
