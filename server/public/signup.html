<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회원가입 — 순번대기</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Malgun Gothic', sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
}
.card {
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 40px;
    width: 100%; max-width: 480px;
    color: white;
}
h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
.subtitle { opacity: .7; margin-bottom: 32px; font-size: 14px; }
.field { margin-bottom: 20px; }
label { display: block; font-size: 13px; opacity: .8; margin-bottom: 6px; }
input, select {
    width: 100%; padding: 12px 16px;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 10px; color: white; font-size: 15px;
    font-family: inherit;
    outline: none; transition: border .2s;
}
input:focus, select:focus { border-color: #00FF88; }
input::placeholder { opacity: .5; }
select option { background: #764ba2; }
.hint { font-size: 11px; opacity: .55; margin-top: 4px; }
.btn {
    width: 100%; padding: 14px;
    background: #00FF88; color: #1a1a2e;
    border: none; border-radius: 10px;
    font-size: 16px; font-weight: 700;
    cursor: pointer; margin-top: 8px;
    transition: opacity .2s;
}
.btn:hover { opacity: .85; }
.btn:disabled { opacity: .4; cursor: not-allowed; }
.error-msg {
    background: rgba(255,71,87,0.2);
    border: 1px solid rgba(255,71,87,0.5);
    border-radius: 8px; padding: 10px 14px;
    font-size: 13px; margin-bottom: 16px; display: none;
}
.link-row { text-align: center; margin-top: 20px; font-size: 13px; opacity: .7; }
.link-row a { color: #00FF88; text-decoration: none; }
</style>
</head>
<body>
<div class="card">
    <h1>업체 등록</h1>
    <p class="subtitle">무료 체험으로 시작합니다 (30일 샌드박스)</p>

    <div id="errorMsg" class="error-msg"></div>

    <div class="field">
        <label>업체명 *</label>
        <input type="text" id="name" placeholder="예: 맛있는 호떡집">
    </div>
    <div class="field">
        <label>업종</label>
        <select id="industryType">
            <option value="">선택 (선택사항)</option>
            <option value="food">음식점 / 카페</option>
            <option value="academy">학원 / 교육</option>
            <option value="clinic">병원 / 의원</option>
            <option value="retail">소매 / 판매</option>
            <option value="service">서비스업</option>
            <option value="other">기타</option>
        </select>
    </div>
    <div class="field">
        <label>URL 슬러그 * <span class="hint">(영문 소문자, 숫자, 하이픈만)</span></label>
        <input type="text" id="slug" placeholder="예: my-shop" oninput="sanitizeSlug(this)">
        <p class="hint" id="slugPreview"></p>
    </div>
    <div class="field">
        <label>관리자 이메일 *</label>
        <input type="email" id="email" placeholder="admin@example.com">
    </div>
    <div class="field">
        <label>비밀번호 * <span class="hint">(8자 이상)</span></label>
        <input type="password" id="password" placeholder="비밀번호">
    </div>

    <button class="btn" id="submitBtn" onclick="doSignup()">가입하기</button>
    <div class="link-row">이미 계정이 있으신가요? <a href="/login">로그인</a></div>
</div>

<script>
function sanitizeSlug(el) {
    el.value = el.value.toLowerCase().replace(/[^a-z0-9-]/g, '').replace(/--+/g, '-');
    const slug = el.value;
    const preview = document.getElementById('slugPreview');
    preview.textContent = slug ? `접속 주소: /${slug}/solo` : '';
}

function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
}
function hideError() { document.getElementById('errorMsg').style.display = 'none'; }

async function doSignup() {
    hideError();
    const name         = document.getElementById('name').value.trim();
    const industryType = document.getElementById('industryType').value;
    const slug         = document.getElementById('slug').value.trim();
    const email        = document.getElementById('email').value.trim();
    const password     = document.getElementById('password').value;

    if (!name || !slug || !email || !password) {
        return showError('필수 항목을 모두 입력해주세요.');
    }
    if (password.length < 8) return showError('비밀번호는 8자 이상이어야 합니다.');

    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.textContent = '처리 중...';

    try {
        const res = await fetch('/api/auth/signup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ name, industryType, slug, email, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error?.message || '가입 실패');

        localStorage.setItem('accessToken', data.accessToken);
        localStorage.setItem('tenantSlug',  data.tenant.slug);
        localStorage.setItem('tenantName',  data.tenant.name);
        localStorage.setItem('sandboxMode', data.tenant.sandboxMode ? '1' : '0');
        window.location.href = `/${data.tenant.slug}/admin/dashboard`;
    } catch (err) {
        showError(err.message);
        btn.disabled = false; btn.textContent = '가입하기';
    }
}
</script>
</body>
</html>
