<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>설정 — 관리자</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Malgun Gothic', sans-serif; min-height: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
.nav { display: flex; align-items: center; gap: 0; padding: 0 24px; background: rgba(0,0,0,0.2); height: 50px; }
.nav-brand { font-size: 16px; font-weight: 700; margin-right: 24px; }
.nav a { padding: 0 14px; height: 50px; display: flex; align-items: center; color: rgba(255,255,255,0.7); text-decoration: none; font-size: 14px; border-bottom: 2px solid transparent; transition: all .15s; }
.nav a:hover, .nav a.active { color: white; border-bottom-color: #00FF88; }
.nav-spacer { flex: 1; }
.nav-logout { padding: 6px 14px; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; color: white; font-size: 13px; cursor: pointer; font-family: inherit; }
.content { padding: 28px 24px; max-width: 800px; margin: 0 auto; }
.page-title { font-size: 22px; font-weight: 700; margin-bottom: 24px; }
.section { margin-bottom: 28px; }
.section-title { font-size: 15px; font-weight: 600; margin-bottom: 14px; opacity: .8; }
.card { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: 14px; padding: 20px; }
.field { margin-bottom: 16px; }
label { display: block; font-size: 13px; opacity: .7; margin-bottom: 6px; }
input[type=number], input[type=text], select {
    padding: 10px 14px; background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.25); border-radius: 8px;
    color: white; font-size: 14px; font-family: inherit; outline: none;
    transition: border .2s; width: 140px;
}
input[type=number]:focus, input[type=text]:focus { border-color: #00FF88; }
select option { background: #764ba2; }
.toggle-row { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
.toggle-label { font-size: 14px; flex: 1; }
.toggle-sub { font-size: 11px; opacity: .5; }
.toggle {
    width: 44px; height: 24px; background: rgba(255,255,255,0.2);
    border-radius: 12px; cursor: pointer; position: relative; transition: background .2s;
    border: none; flex-shrink: 0;
}
.toggle.on { background: #00FF88; }
.toggle::after {
    content: ''; position: absolute;
    top: 2px; left: 2px;
    width: 20px; height: 20px; border-radius: 50%; background: white;
    transition: transform .2s;
}
.toggle.on::after { transform: translateX(20px); }
.save-btn {
    padding: 10px 24px; background: #00FF88; color: #1a1a2e;
    border: none; border-radius: 8px; font-size: 14px; font-weight: 700;
    cursor: pointer; font-family: inherit; margin-top: 4px;
}
.save-btn:hover { opacity: .85; }
.save-btn:disabled { opacity: .4; cursor: not-allowed; }
.toast { position: fixed; bottom: 24px; right: 24px; background: rgba(0,0,0,0.8); color: white; padding: 12px 20px; border-radius: 10px; font-size: 14px; display: none; z-index: 999; }

/* Category list */
.cat-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
.cat-row { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 10px 14px; }
.cat-row .cat-code { font-weight: 700; font-size: 13px; min-width: 60px; }
.cat-row .cat-name { flex: 1; font-size: 14px; }
.cat-row .cat-inactive { opacity: .4; text-decoration: line-through; }
.cat-toggle { padding: 4px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: inherit; border: 1px solid; }
.cat-toggle.deactivate { background: rgba(255,71,87,0.15); border-color: #ff4757; color: #ff4757; }
.cat-toggle.activate   { background: rgba(0,255,136,0.15); border-color: #00FF88;  color: #00FF88; }
.add-row { display: flex; gap: 8px; flex-wrap: wrap; }
.add-input { width: 100px !important; }
.add-btn { padding: 10px 16px; background: rgba(0,255,136,0.2); border: 1px solid #00FF88; border-radius: 8px; color: #00FF88; font-size: 13px; cursor: pointer; font-family: inherit; }
</style>
</head>
<body>
<nav class="nav">
    <span class="nav-brand" id="navBrand">관리자</span>
    <a id="navDash" href="#">대시보드</a>
    <a id="navSettings" href="#" class="active">설정</a>
    <a id="navMessages" href="#">메시지</a>
    <a id="navSubscription" href="#">구독</a>
    <div class="nav-spacer"></div>
    <button class="nav-logout" onclick="logout()">로그아웃</button>
</nav>

<div class="content">
    <div class="page-title">설정</div>

    <!-- 기본 설정 -->
    <div class="section">
        <div class="section-title">운영 설정</div>
        <div class="card">
            <div class="field">
                <label>창구(카운터) 수</label>
                <input type="number" id="counterCount" min="1" max="20" value="1">
            </div>
            <div class="field">
                <label>번호 자릿수</label>
                <input type="number" id="ticketDigits" min="2" max="5" value="3">
            </div>
            <div class="toggle-row">
                <div>
                    <div class="toggle-label">전화번호 입력</div>
                    <div class="toggle-sub">번호 발급 시 고객 전화번호 입력 허용</div>
                </div>
                <button class="toggle" id="togglePhone" onclick="toggle('togglePhone', 'phone_input_enabled')"></button>
            </div>
            <div class="toggle-row">
                <div>
                    <div class="toggle-label">QR 셀프 접수</div>
                    <div class="toggle-sub">고객이 QR 코드로 직접 접수</div>
                </div>
                <button class="toggle" id="toggleQr" onclick="toggle('toggleQr', 'qr_join_enabled')"></button>
            </div>
            <div class="toggle-row">
                <div>
                    <div class="toggle-label">메뉴 선택</div>
                    <div class="toggle-sub">음식점형 — 번호 발급 시 메뉴 항목 선택</div>
                </div>
                <button class="toggle" id="toggleMenu" onclick="toggle('toggleMenu', 'menu_selection_enabled')"></button>
            </div>
            <button class="save-btn" id="saveSettingsBtn" onclick="saveSettings()">저장</button>
        </div>
    </div>

    <!-- 카테고리 관리 -->
    <div class="section">
        <div class="section-title">카테고리 관리</div>
        <div class="card">
            <div class="cat-list" id="catList">
                <div style="opacity:.5;text-align:center;padding:20px">로딩 중...</div>
            </div>
            <div class="add-row">
                <input type="text" class="add-input" id="newCatCode" placeholder="코드 (영문)" oninput="this.value=this.value.toUpperCase()">
                <input type="text" class="add-input" style="width:160px!important" id="newCatName" placeholder="이름">
                <button class="add-btn" onclick="addCategory()">+ 추가</button>
            </div>
        </div>
    </div>

    <!-- 메뉴 항목 관리 -->
    <div class="section" id="menuSection" style="display:none">
        <div class="section-title">메뉴 항목 관리</div>
        <div class="card">
            <div class="cat-list" id="menuList">
                <div style="opacity:.5;text-align:center;padding:20px">로딩 중...</div>
            </div>
            <div class="add-row">
                <input type="text" class="add-input" id="newMenuCode" placeholder="코드 (영문)" oninput="this.value=this.value.toUpperCase()">
                <input type="text" class="add-input" style="width:160px!important" id="newMenuName" placeholder="메뉴 이름">
                <button class="add-btn" onclick="addMenuItem()">+ 추가</button>
            </div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
const slug = window.location.pathname.split('/')[1];
let accessToken = localStorage.getItem('accessToken');
function esc(s) { const d = document.createElement('div'); d.textContent = String(s ?? ''); return d.innerHTML; }
if (!accessToken) { window.location.href = `/login?next=${encodeURIComponent(window.location.pathname)}`; }

document.getElementById('navBrand').textContent   = localStorage.getItem('tenantName') || '관리자';
document.getElementById('navDash').href           = `/${slug}/admin/dashboard`;
document.getElementById('navSettings').href       = `/${slug}/admin/settings`;
document.getElementById('navMessages').href       = `/${slug}/admin/messages`;
document.getElementById('navSubscription').href   = `/${slug}/admin/subscription`;

let settingsState = {};

async function apiFetch(url, opts = {}) {
    const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
    if (accessToken) headers['Authorization'] = `Bearer ${accessToken}`;
    let res = await fetch(url, { ...opts, headers, credentials: 'include' });
    if (res.status === 401) {
        const rr = await fetch('/api/auth/refresh', { method: 'POST', credentials: 'include' });
        if (rr.ok) {
            const d = await rr.json();
            accessToken = d.accessToken; localStorage.setItem('accessToken', accessToken);
            headers['Authorization'] = `Bearer ${accessToken}`;
            res = await fetch(url, { ...opts, headers, credentials: 'include' });
        } else { localStorage.clear(); window.location.href = '/login'; return null; }
    }
    return res;
}

function showToast(msg, ok = true) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = ok ? 'rgba(0,80,0,0.9)' : 'rgba(120,0,0,0.9)';
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2500);
}

function toggle(btnId, key) {
    const btn = document.getElementById(btnId);
    btn.classList.toggle('on');
    settingsState[key] = btn.classList.contains('on');
}

async function loadSettings() {
    const res = await apiFetch(`/api/${slug}/admin/settings`);
    if (!res?.ok) return;
    const { settings } = await res.json();
    if (!settings) return;
    settingsState = { ...settings };

    document.getElementById('counterCount').value  = settings.counter_count ?? 1;
    document.getElementById('ticketDigits').value  = settings.ticket_digits ?? 3;
    document.getElementById('togglePhone').classList.toggle('on', !!settings.phone_input_enabled);
    document.getElementById('toggleQr').classList.toggle('on', !!settings.qr_join_enabled);
    document.getElementById('toggleMenu').classList.toggle('on', !!settings.menu_selection_enabled);

    if (settings.menu_selection_enabled) document.getElementById('menuSection').style.display = 'block';
}

async function saveSettings() {
    const btn = document.getElementById('saveSettingsBtn');
    btn.disabled = true;
    try {
        const body = {
            counter_count:         parseInt(document.getElementById('counterCount').value) || 1,
            ticket_digits:         parseInt(document.getElementById('ticketDigits').value) || 3,
            phone_input_enabled:   document.getElementById('togglePhone').classList.contains('on'),
            qr_join_enabled:       document.getElementById('toggleQr').classList.contains('on'),
            menu_selection_enabled:document.getElementById('toggleMenu').classList.contains('on'),
        };
        const res = await apiFetch(`/api/${slug}/admin/settings`, { method: 'PUT', body: JSON.stringify(body) });
        if (!res?.ok) throw new Error((await res.json()).error?.message || '저장 실패');
        showToast('저장되었습니다.');
        document.getElementById('menuSection').style.display = body.menu_selection_enabled ? 'block' : 'none';
    } catch (e) {
        showToast(e.message, false);
    } finally { btn.disabled = false; }
}

async function loadCategories() {
    const res = await apiFetch(`/api/${slug}/admin/categories`);
    if (!res?.ok) return;
    const { categories } = await res.json();
    renderCategories(categories || []);
}

function renderCategories(list) {
    const el = document.getElementById('catList');
    if (!list.length) { el.innerHTML = '<div style="opacity:.5;text-align:center;padding:16px">카테고리 없음</div>'; return; }
    el.innerHTML = list.map(c => `
        <div class="cat-row" data-code="${esc(c.code)}" data-name="${esc(c.name)}" data-active="${c.is_active ? '1' : '0'}">
            <span class="cat-code">${esc(c.code)}</span>
            <span class="cat-name ${c.is_active ? '' : 'cat-inactive'}">${esc(c.name)}</span>
            <button class="cat-toggle ${c.is_active ? 'deactivate' : 'activate'}">
                ${c.is_active ? '비활성화' : '활성화'}
            </button>
        </div>`).join('');
    el.querySelectorAll('.cat-toggle').forEach(btn => {
        const row = btn.closest('.cat-row');
        btn.addEventListener('click', () => toggleCategory(row.dataset.code, row.dataset.name, row.dataset.active !== '1'));
    });
}

async function addCategory() {
    const code = document.getElementById('newCatCode').value.trim().toUpperCase();
    const name = document.getElementById('newCatName').value.trim();
    if (!code || !name) return showToast('코드와 이름을 입력해주세요.', false);
    const res = await apiFetch(`/api/${slug}/admin/categories`, { method: 'POST', body: JSON.stringify({ code, name }) });
    if (!res?.ok) { const d = await res.json(); return showToast(d.error?.message || '추가 실패', false); }
    document.getElementById('newCatCode').value = '';
    document.getElementById('newCatName').value = '';
    showToast('카테고리 추가됨');
    loadCategories();
}

async function toggleCategory(code, name, isActive) {
    const res = await apiFetch(`/api/${slug}/admin/categories`, {
        method: 'POST',
        body: JSON.stringify({ code, name, isActive }),
    });
    if (res?.ok) loadCategories();
}

async function loadMenuItems() {
    const res = await apiFetch(`/api/${slug}/admin/menu-items`);
    if (!res?.ok) return;
    const { menuItems } = await res.json();
    renderMenuItems(menuItems || []);
}

function renderMenuItems(list) {
    const el = document.getElementById('menuList');
    if (!list.length) { el.innerHTML = '<div style="opacity:.5;text-align:center;padding:16px">메뉴 항목 없음</div>'; return; }
    el.innerHTML = list.map(m => `
        <div class="cat-row" data-code="${esc(m.code)}" data-name="${esc(m.name)}" data-active="${m.is_active ? '1' : '0'}">
            <span class="cat-code">${esc(m.code)}</span>
            <span class="cat-name ${m.is_active ? '' : 'cat-inactive'}">${esc(m.name)}</span>
            <button class="cat-toggle ${m.is_active ? 'deactivate' : 'activate'}">
                ${m.is_active ? '비활성화' : '활성화'}
            </button>
        </div>`).join('');
    el.querySelectorAll('.cat-toggle').forEach(btn => {
        const row = btn.closest('.cat-row');
        btn.addEventListener('click', () => toggleMenuItem(row.dataset.code, row.dataset.name, row.dataset.active !== '1'));
    });
}

async function addMenuItem() {
    const code = document.getElementById('newMenuCode').value.trim().toUpperCase();
    const name = document.getElementById('newMenuName').value.trim();
    if (!code || !name) return showToast('코드와 이름을 입력해주세요.', false);
    const res = await apiFetch(`/api/${slug}/admin/menu-items`, { method: 'POST', body: JSON.stringify({ code, name }) });
    if (!res?.ok) { const d = await res.json(); return showToast(d.error?.message || '추가 실패', false); }
    document.getElementById('newMenuCode').value = '';
    document.getElementById('newMenuName').value = '';
    showToast('메뉴 항목 추가됨');
    loadMenuItems();
}

async function toggleMenuItem(code, name, isActive) {
    await apiFetch(`/api/${slug}/admin/menu-items`, { method: 'POST', body: JSON.stringify({ code, name, isActive }) });
    loadMenuItems();
}

function logout() {
    fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
    localStorage.clear(); window.location.href = '/login';
}

loadSettings();
loadCategories();
loadMenuItems();
</script>
</body>
</html>
